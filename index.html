let codeInput = '';
let codeError = false;
let codeErrorShake = 0;
let levelScroll = 0;

// My Levels — creator key session
let myLevelsKeyInput = '';   // 8 raw chars (no dash) while typing
let myLevelsKey = null;      // formatted XXXX-XXXX once loaded
let myLevelsList = [];
let myLevelsLoading = false;
let myLevelsError = '';

function levelsForTab(tab) {
  if (tab === 'mine') return myLevelsList;
  return LEVEL_CATALOG.filter(l => l.cat === tab);
}

async function submitCreatorKey() {
  const raw = myLevelsKeyInput.toUpperCase().replace(/[^A-Z0-9]/g, '');
  if (raw.length !== 8) { myLevelsError = 'Key must be 8 characters'; return; }
  const key = `${raw.slice(0, 4)}-${raw.slice(4)}`;
  myLevelsLoading = true;
  myLevelsError = '';
  try {
    const res = await fetch(`/api/unofficial/my-levels?creatorKey=${encodeURIComponent(key)}`);
    if (!res.ok) throw new Error('Server error');
    const list = await res.json();
    myLevelsKey = key;
    localStorage.setItem('cw_key', key);
    myLevelsList = list.map(l => ({
      ...l,
      cat:       'mine',
      unofficial: !l.official,
      theme:     'hallway',
      best:      null,
      plays:     0,
      rejected:  !!l.rejected && !l.locked,
      rejectionReason: l.rejectionReason || null,
    }));
    myLevelsError = '';
  } catch (err) {
    myLevelsError = 'Could not load levels';
  } finally {
    myLevelsLoading = false;
    levelScroll = 0;
  }
}

function autoLoadCreatorKey() {
  const saved = localStorage.getItem('cw_key');
  if (!saved || myLevelsKey !== null || myLevelsLoading) return;
  const raw = saved.replace(/-/g, '');
  if (raw.length !== 8) return;
  myLevelsKeyInput = raw;
  submitCreatorKey();
}

function submitCode() {
  const c = codeInput.trim().toUpperCase();
  const found = LEVEL_CATALOG.find(l => l.code === c)
             || myLevelsList.find(l => l.code === c);
  if (found) {
    codeInput = '';
    codeError = false;
    startSelectedLevel(found);
  } else {
    codeError = true;
    codeErrorShake = 0.5;
  }
}

function applyMapAndStart(entry, mapData) {
  currentMapData = mapData || null;
  currentLevelCode = entry.code.toLowerCase();
  navigate('/play-game/' + entry.code.toLowerCase());

  if (currentMapData) {
    let maxCol = 0, maxRow = 0;
    for (const k of Object.keys(currentMapData.cells)) {
      const [c, r] = k.split(',').map(Number);
      if (c > maxCol) maxCol = c;
      if (r > maxRow) maxRow = r;
    }
    MAP_W = (maxCol + 1) * CELL;
    MAP_H = (maxRow + 1) * CELL;
  }

  resetLevel();
}

function startSelectedLevel(entry) {
  if (entry.map) {
    applyMapAndStart(entry, entry.map);
    return;
  }
  if (entry.unofficial && myLevelsKey) {
    fetch(`/api/unofficial/${entry.code}?creatorKey=${encodeURIComponent(myLevelsKey)}`)
      .then(r => r.ok ? r.json() : null)
      .then(mapData => {
        if (mapData) entry.map = mapData;
        applyMapAndStart(entry, mapData);
      })
      .catch(() => applyMapAndStart(entry, null));
    return;
  }
  fetch('/api/games/' + entry.code)
    .then(r => r.ok ? r.json() : null)
    .then(mapData => {
      if (mapData) entry.map = mapData;
      applyMapAndStart(entry, mapData);
    })
    .catch(() => applyMapAndStart(entry, null));
}

// ─────────────────────────────────────────────
// LEVEL SELECT SCREEN
// ─────────────────────────────────────────────
function drawLevelSelect(t, dt) {
  // Backdrop
  const g = ctx.createLinearGradient(0, 0, 0, VH);
  g.addColorStop(0, '#2a4f6a');
  g.addColorStop(1, '#1a2f44');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, VW, VH);

  // Subtle scanlines
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = '#000';
  for (let y = 0; y < VH; y += 4) ctx.fillRect(0, y, VW, 2);
  ctx.globalAlpha = 1;

  const cx = VW / 2;
  const padX = Math.max(40, (VW - 1180) / 2);

  // Header
  ctx.fillStyle = '#ffd84a';
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SELECT LEVEL', padX, 70);
  ctx.fillStyle = 'rgba(168,212,240,0.7)';
  ctx.font = '13px monospace';
  ctx.fillText('Pick from the marketplace, or punch in a code.', padX, 92);

  // Back button
  drawSmallButton(padX + 1180 - 120, 48, 120, 36, '◀ LOBBY', '#3d6d8f', '#a8d4f0');

  // Code entry bar
  const codeY = 120;
  drawCodeEntry(padX, codeY, 1180, 70, dt);

  // Tabs
  const tabsY = codeY + 90;
  const tabs = [
    { key: 'popular', label: 'POPULAR' },
    { key: 'system',  label: 'OFFICIAL' },
    { key: 'mine',    label: 'MY LEVELS' },
  ];
  let tx = padX;
  for (const tab of tabs) {
    drawTab(tx, tabsY, 180, 42, tab.label, tab.key === levelTab, 'tab:' + tab.key);
    tx += 188;
  }
  // Tab underline
  ctx.fillStyle = 'rgba(255,216,74,0.25)';
  ctx.fillRect(padX, tabsY + 42, 1180, 2);

  // Cards
  const list = levelsForTab(levelTab);
  const cardW = 280, cardH = 200, gap = 16;
  const colsPerRow = Math.max(1, Math.floor((1180 + gap) / (cardW + gap)));
  const gridY = tabsY + 64;
  const gridH = VH - gridY - 40;

  ctx.save();
  ctx.beginPath();
  ctx.rect(padX, gridY, 1180, gridH);
  ctx.clip();

  if (levelTab === 'mine' && myLevelsKey === null) {
    // Creator key entry area
    const entryW = Math.min(760, 1180);
    const entryX = padX + (1180 - entryW) / 2;
    drawCreatorKeyEntry(entryX, gridY + 24, entryW, 88, dt);
    if (myLevelsLoading) {
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = '14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Loading…', padX + 590, gridY + 160);
    } else if (myLevelsError) {
      ctx.fillStyle = '#ff7a8a';
      ctx.font = 'bold 13px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(myLevelsError, padX + 590, gridY + 160);
    } else {
      ctx.fillStyle = 'rgba(168,212,240,0.5)';
      ctx.font = '12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Your creator key links all your levels — official and unofficial.', padX + 590, gridY + 160);
    }
  } else if (list.length === 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '16px monospace';
    ctx.textAlign = 'center';
    if (levelTab === 'mine') {
      ctx.fillText('No levels found for this key.', padX + 590, gridY + 80);
      ctx.font = '12px monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillText('Use the MAP BUILDER to create your first level.', padX + 590, gridY + 104);
      drawSmallButton(padX + 590 - 70, gridY + 128, 140, 30, 'CHANGE KEY', '#3d6d8f', '#a8d4f0', 'key:clear');
    } else {
      ctx.fillText("No levels available.", padX + 590, gridY + 80);
    }
  } else {
    if (levelTab === 'mine') {
      drawSmallButton(padX + 1180 - 130, gridY - 36, 130, 26, 'CHANGE KEY', '#3d6d8f', '#a8d4f0', 'key:clear');
    }
    for (let i = 0; i < list.length; i++) {
      const col = i % colsPerRow;
      const row = Math.floor(i / colsPerRow);
      const x = padX + col * (cardW + gap);
      const y = gridY + row * (cardH + gap) - levelScroll;
      if (y + cardH < gridY || y > gridY + gridH) continue;
      drawLevelCard(x, y, cardW, cardH, list[i]);
    }
  }
  ctx.restore();
}

function drawCodeEntry(x, y, w, h, dt) {
  // Shake decay
  if (codeErrorShake > 0) codeErrorShake = Math.max(0, codeErrorShake - dt);
  const shake = codeErrorShake > 0 ? Math.sin(codeErrorShake * 90) * 6 * (codeErrorShake / 0.5) : 0;

  ctx.save();
  ctx.translate(shake, 0);

  // Frame
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = codeError ? '#e03040' : 'rgba(255,216,74,0.4)';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);

  // Label
  ctx.fillStyle = codeError ? '#ff7a8a' : '#ffd84a';
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(codeError ? 'CODE NOT FOUND' : 'ENTER LEVEL CODE', x + 18, y + 20);

  // 6 character slots
  const slotW = 50, slotH = 40, slotGap = 8;
  const slotsW = slotW * 6 + slotGap * 5;
  const slotX = x + 18;
  const slotY = y + h / 2 - slotH / 2 + 6;
  for (let i = 0; i < 6; i++) {
    const sx = slotX + i * (slotW + slotGap);
    ctx.fillStyle = '#0e1822';
    ctx.fillRect(sx, slotY, slotW, slotH);
    ctx.strokeStyle = i === codeInput.length ? '#ffd84a' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 2;
    ctx.strokeRect(sx, slotY, slotW, slotH);
    if (codeInput[i]) {
      ctx.fillStyle = codeError ? '#ff7a8a' : '#a8d4f0';
      ctx.font = 'bold 26px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(codeInput[i], sx + slotW / 2, slotY + slotH / 2 + 1);
      ctx.textBaseline = 'alphabetic';
    } else if (i === codeInput.length && Math.floor(t * 2) % 2 === 0) {
      ctx.fillStyle = '#ffd84a';
      ctx.fillRect(sx + slotW / 2 - 1, slotY + 8, 2, slotH - 16);
    }
  }

  // GO button
  const goX = slotX + slotsW + 24;
  const goW = w - (slotX - x) - slotsW - 24 - 18;
  drawSmallButton(goX, slotY, goW, slotH, '▶  GO', codeInput.length === 6 ? '#e03040' : '#5a3a3a', '#ffd84a', 'code:go');

  ctx.restore();
}

function drawCreatorKeyEntry(x, y, w, h, dt) {
  const hasError = !!myLevelsError;

  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = hasError ? '#e03040' : 'rgba(255,216,74,0.4)';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);

  ctx.fillStyle = hasError ? '#ff7a8a' : '#ffd84a';
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('ENTER CREATOR KEY', x + 18, y + 20);

  // 8 slots with a visual dash gap after slot 3
  const slotW = 42, slotH = 40, slotGap = 6, dashW = 18;
  const slotX = x + 18;
  const slotY = y + h / 2 - slotH / 2 + 6;

  for (let i = 0; i < 8; i++) {
    const sx = slotX + i * (slotW + slotGap) + (i >= 4 ? dashW : 0);
    ctx.fillStyle = '#0e1822';
    ctx.fillRect(sx, slotY, slotW, slotH);
    ctx.strokeStyle = i === myLevelsKeyInput.length ? '#ffd84a' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 2;
    ctx.strokeRect(sx, slotY, slotW, slotH);
    if (myLevelsKeyInput[i]) {
      ctx.fillStyle = hasError ? '#ff7a8a' : '#a8d4f0';
      ctx.font = 'bold 22px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(myLevelsKeyInput[i], sx + slotW / 2, slotY + slotH / 2 + 1);
      ctx.textBaseline = 'alphabetic';
    } else if (i === myLevelsKeyInput.length && Math.floor(t * 2) % 2 === 0) {
      ctx.fillStyle = '#ffd84a';
      ctx.fillRect(sx + slotW / 2 - 1, slotY + 8, 2, slotH - 16);
    }
    // Dash separator between slot 3 and slot 4
    if (i === 3) {
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.font = 'bold 20px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('−', sx + slotW + slotGap + dashW / 2, slotY + slotH / 2 + 1);
      ctx.textBaseline = 'alphabetic';
    }
  }

  const slotsW = slotW * 8 + slotGap * 7 + dashW;
  const goX = slotX + slotsW + 24;
  const goW = w - (slotX - x) - slotsW - 24 - 18;
  drawSmallButton(goX, slotY, goW, slotH, '▶  GO',
    myLevelsKeyInput.length === 8 ? '#e03040' : '#5a3a3a', '#ffd84a', 'key:go');
}

function drawTab(x, y, w, h, label, active, action) {
  ctx.fillStyle = active ? '#e03040' : 'rgba(255,255,255,0.06)';
  ctx.fillRect(x, y, w, h);
  if (active) {
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(x, y, w, 3);
  }
  ctx.fillStyle = active ? '#fff' : 'rgba(255,255,255,0.55)';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h / 2 + 1);
  ctx.textBaseline = 'alphabetic';
  buttons.push({ x, y, w, h, label, action });
}

function drawSmallButton(x, y, w, h, label, bg, fg, action) {
  ctx.fillStyle = bg;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(x, y, w, 3);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(x, y + h - 3, w, 3);
  ctx.fillStyle = fg;
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h / 2 + 1);
  ctx.textBaseline = 'alphabetic';
  buttons.push({ x, y, w, h, label, action: action || ('btn:' + label) });
}

function drawLevelCard(x, y, w, h, lvl) {
  // Card body
  ctx.fillStyle = '#1c2c40';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);

  // Thumbnail area
  const thW = w, thH = 100;
  drawLevelThumbnail(x, y, thW, thH, lvl);

  // Difficulty badge (top-right of thumbnail)
  const dx = x + w - 56, dy = y + 8;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(dx, dy, 48, 22);
  ctx.fillStyle = '#ffd84a';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('DIFF', dx + 6, dy + 14);
  // Stars
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = i < lvl.diff ? '#ffd84a' : 'rgba(255,255,255,0.2)';
    ctx.fillRect(dx + 6 + i * 7, dy + 17, 4, 2);
  }

  // Code chip (top-left)
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(x + 8, y + 8, 70, 20);
  ctx.fillStyle = '#a8d4f0';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(lvl.code, x + 8 + 35, y + 22);

  // Status badge for My Levels cards
  if (lvl.cat === 'mine') {
    const isOfficial = !lvl.unofficial;
    let status, badgeColor, badgeFg;
    if (isOfficial)        { status = 'OFFICIAL';  badgeColor = '#00cc66'; badgeFg = '#1a3a25'; }
    else if (lvl.locked)   { status = 'SUBMITTED'; badgeColor = '#ff9944'; badgeFg = '#0e1822'; }
    else if (lvl.rejected) { status = 'REJECTED';  badgeColor = '#e03040'; badgeFg = '#1a0a0a'; }
    else                   { status = 'DRAFT';     badgeColor = '#4dabf7'; badgeFg = '#0e1822'; }
    ctx.fillStyle = badgeColor;
    ctx.fillRect(x + 8, y + 32, 70, 16);
    ctx.fillStyle = badgeFg;
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(status, x + 8 + 35, y + 43);
  }

  // Body text
  const tx = x + 12;
  let ty = y + thH + 22;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'left';
  // Truncate name if too long
  const maxName = w - 24;
  let nm = lvl.name;
  ctx.font = 'bold 16px monospace';
  while (ctx.measureText(nm).width > maxName && nm.length > 3) nm = nm.slice(0, -1);
  if (nm !== lvl.name) nm = nm.slice(0, -1) + '…';
  ctx.fillText(nm, tx, ty);

  ty += 18;
  ctx.fillStyle = 'rgba(168,212,240,0.7)';
  ctx.font = '12px monospace';
  ctx.fillText('by ' + lvl.author, tx, ty);

  if (lvl.description) {
    ty += 16;
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = '11px monospace';
    const maxDescW = w - 24;
    let desc = lvl.description;
    while (ctx.measureText(desc).width > maxDescW && desc.length > 3) desc = desc.slice(0, -1);
    if (desc !== lvl.description) desc = desc.slice(0, -1) + '…';
    ctx.fillText(desc, tx, ty);
  }

  // Stats row
  ty = y + h - 14;
  ctx.fillStyle = '#00ff88';
  ctx.font = 'bold 12px monospace';
  ctx.fillText(lvl.best != null ? '⏱ ' + lvl.best.toFixed(1) + 's' : '⏱ —', tx, ty);
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.textAlign = 'right';
  const playStr = lvl.plays >= 1000 ? (lvl.plays / 1000).toFixed(1) + 'k' : String(lvl.plays);
  ctx.fillText('▶ ' + playStr, x + w - 12, ty);
  ctx.textAlign = 'left';

  // Whole card is clickable
  buttons.push({ x, y, w, h, label: 'level:' + lvl.code, action: 'level:' + lvl.code });
}

function drawLevelThumbnail(x, y, w, h, lvl) {
  // Theme-tinted mini-map
  const themes = {
    hallway:    { bg: '#c8a870', accent: '#4a7fa5', detail: '#8b6f47' },
    playground: { bg: '#5a8a4a', accent: '#d4a060', detail: '#3d6d8f' },
    cafeteria:  { bg: '#dccba5', accent: '#8b5e3c', detail: '#c8703a' },
    office:     { bg: '#7a6a8a', accent: '#5a3820', detail: '#3d5a4a' },
    baseball:   { bg: '#6a9a5a', accent: '#b89060', detail: '#fff' },
  };
  const th = themes[lvl.theme] || themes.hallway;
  ctx.fillStyle = th.bg;
  ctx.fillRect(x, y, w, h);

  // Tile pattern (very small)
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  for (let cx = 0; cx < w; cx += 16) {
    for (let cy = 0; cy < h; cy += 16) {
      if (((cx / 16) + (cy / 16)) % 2 === 0) ctx.fillRect(x + cx, y + cy, 16, 16);
    }
  }

  // Theme-specific motif (simple shapes only)
  ctx.save();
  ctx.translate(x, y);
  if (lvl.theme === 'hallway') {
    // Two locker strips top and bottom
    ctx.fillStyle = th.accent;
    ctx.fillRect(0, 8, w, 14);
    ctx.fillRect(0, h - 22, w, 14);
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    for (let i = 0; i < w; i += 12) {
      ctx.fillRect(i, 8, 1, 14);
      ctx.fillRect(i, h - 22, 1, 14);
    }
  } else if (lvl.theme === 'playground') {
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(w / 2 - 30, h / 2 - 18, 60, 36);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(w / 2, h / 2, 8, 0, Math.PI * 2);
    ctx.stroke();
  } else if (lvl.theme === 'cafeteria') {
    ctx.fillStyle = th.accent;
    for (let r = 0; r < 3; r++) ctx.fillRect(20, 24 + r * 18, w - 40, 6);
  } else if (lvl.theme === 'office') {
    ctx.fillStyle = th.accent;
    ctx.fillRect(w / 2 - 4, 10, 8, h - 20);
    ctx.fillStyle = th.detail;
    ctx.fillRect(10, 18, 24, 14);
    ctx.fillRect(w - 34, 18, 24, 14);
    ctx.fillRect(10, h - 32, 24, 14);
    ctx.fillRect(w - 34, h - 32, 24, 14);
  } else if (lvl.theme === 'baseball') {
    ctx.fillStyle = th.accent;
    ctx.beginPath();
    ctx.arc(w / 2, h - 14, 32, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(w / 2 - 1, h - 14, 2, 2);
  }
  ctx.restore();

  // Jax dot + Chandler dot
  ctx.fillStyle = '#4dabf7';
  ctx.fillRect(x + 8, y + h - 12, 4, 4);
  ctx.fillStyle = '#e03040';
  ctx.fillRect(x + w - 12, y + 8, 5, 5);

  // Scanline overlay
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  for (let i = 0; i < h; i += 3) ctx.fillRect(x, y + i, w, 1);

  // Featured ribbon
  if (lvl.featured) {
    ctx.fillStyle = '#ffd84a';
    ctx.save();
    ctx.translate(x + w - 4, y + h - 4);
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(-72, -22, 72, 18);
    ctx.fillStyle = '#ffd84a';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('★ FEATURED', -36, -9);
    ctx.restore();
  }
}

function drawLockerLobby(x, y, w, h) {
  ctx.fillStyle = PAL.lockerA;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = PAL.lockerTrim;
  ctx.fillRect(x, y, 3, h);
  ctx.fillStyle = PAL.lockerB;
  ctx.fillRect(x + w - 4, y, 4, h);
  ctx.fillRect(x, y + h - 4, w, 4);
  ctx.fillStyle = PAL.lockerVent;
  for (let i = 0; i < 3; i++) ctx.fillRect(x + 8, y + 14 + i * 8, w - 16, 2);
  ctx.fillStyle = PAL.doorKnob;
  ctx.fillRect(x + w - 14, y + h / 2 - 5, 6, 10);
  ctx.strokeStyle = PAL.lockerVent;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x + w / 2, y + 4);
  ctx.lineTo(x + w / 2, y + h - 4);
  ctx.stroke();
}

function drawLobbySprite(cx, cy, who, t) {
  ctx.save();
  ctx.translate(cx, cy);
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(0, 60, 38, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  if (who === 'jax') {
    ctx.scale(2.4, 2.4);
    const cycle = (t * 6) % 2;
    const frame = cycle < 1 ? 1 : 2;
    Sprites.drawJaxSprite(ctx, -16, -20, frame, 1);
  } else {
    ctx.scale(2.2, 2.2);
    const cycle = (t * 5) % 2;
    const frame = cycle < 1 ? 1 : 2;
    Sprites.drawChandlerSprite(ctx, -17, -23, frame, -1, false);
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
// EXIT COMPASS (off-screen arrow)
// ─────────────────────────────────────────────
function drawExitCompass() {
  const ex = exitPos.x + exitPos.w / 2, ey = exitPos.y + exitPos.h / 2;
  const jcx = jax.x + PLAYER_SIZE/2, jcy = jax.y + PLAYER_SIZE/2;
  const dx = ex - jcx, dy = ey - jcy;
  const angle = Math.atan2(dy, dx);

  const hx = VW - 80, hy = 80;
  ctx.save();
  ctx.translate(hx, hy);
  ctx.fillStyle = 'rgba(10,10,20,0.8)';
  ctx.beginPath();
  ctx.arc(0, 0, 28, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#00ff88';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.rotate(angle);
  ctx.fillStyle = '#00ff88';
  ctx.beginPath();
  ctx.moveTo(18, 0);
  ctx.lineTo(-8, -7);
  ctx.lineTo(-8, 7);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  ctx.fillStyle = '#00ff88';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('EXIT', hx, hy + 44);
}

// ─────────────────────────────────────────────
// PARTICLES
// ─────────────────────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 80 + Math.random() * 160;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.6 + Math.random() * 0.4,
      maxLife: 1,
      color, size: 4 + Math.random() * 6
    });
  }
}

function updateParticles(dt) {
  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.9;
    p.vy *= 0.9;
    p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ─────────────────────────────────────────────
// LEVEL INIT
// ─────────────────────────────────────────────
function makeVillainObj(vd) {
  const def = VILLAIN_DEFS[vd.type] || VILLAIN_DEFS.chandler;
  const speed = (vd.data && vd.data.speed != null)
    ? vd.data.speed * PLAYER_SPEED
    : def.defaultSpeed * PLAYER_SPEED;
  return {
    type: vd.type, def,
    x: vd.col * CELL + (CELL - CHANDLER_SIZE) / 2,
    y: vd.row * CELL + (CELL - CHANDLER_SIZE) / 2,
    w: CHANDLER_SIZE, h: CHANDLER_SIZE,
    speed, stun: 0, facing: 1, walkTime: 0, vx: 0, vy: 0,
  };
}

function resetLevel() {
  let jaxX = 160, jaxY = 2100;

  if (currentMapData) {
    const [pc, pr] = currentMapData.playerStart;
    const [ec, er] = currentMapData.exit;
    jaxX = pc * CELL + (CELL - PLAYER_SIZE) / 2;
    jaxY = pr * CELL + (CELL - PLAYER_SIZE) / 2;
    const es = 90;
    exitPos = { x: ec * CELL + (CELL - es) / 2, y: er * CELL + (CELL - es) / 2, w: es, h: es };

    // v2 format: villains[]. Fall back to v1 single villain field.
    const vdata = currentMapData.villains ||
      (currentMapData.villain
        ? [{ type: 'chandler', col: currentMapData.villain[0], row: currentMapData.villain[1], data: {} }]
        : []);
    villains = vdata.map(makeVillainObj);
  } else {
    villains = [makeVillainObj({ type: 'chandler', col: 2, row: 32, data: {} })];
  }

  jax = { x: jaxX, y: jaxY, w: PLAYER_SIZE, h: PLAYER_SIZE, vx: 0, vy: 0,
          facing: 1, walkTime: 0, moving: false };
  caughtBy = null;
  levelTime = 0;
  activeBuffs = [];
  particles = [];
  winName = '';
  winSubmitting = false;
  winSubmitted = false;
  winError = '';

  if (currentMapData) {
    objects = buildObjectsFromMap(currentMapData);
    // Pickups from map specials
    const pickupTypeMap = { gel: 'hair_gel', mirror: 'mirror', spray: 'hairspray' };
    const psize = 22;
    for (const [k, pos] of Object.entries(currentMapData.pickups || {})) {
      if (!pos) continue;
      const type = pickupTypeMap[k];
      if (!type) continue;
      objects.push({
        x: pos[0] * CELL + (CELL - psize) / 2,
        y: pos[1] * CELL + (CELL - psize) / 2,
        w: psize, h: psize, kind: 'pickup', type,
        pulse: Math.random() * Math.PI * 2,
      });
    }
  } else {
    objects = [...buildWalls(), ...buildChairs(), ...buildPickups()];
  }

  gameState = 'playing';
  buttons = [];
  navGrid = null;
  buildNavGrid();
  updateCamera();
}

// ─────────────────────────────────────────────
// UPDATE
// ─────────────────────────────────────────────
function update(dt) {
  if (gameState !== 'playing') return;

  levelTime += dt;
  exitPulse += dt;
  tickBuffs(dt);
  updateParticles(dt);

  // Jax movement toward mouse
  const jcx = jax.x + PLAYER_SIZE/2, jcy = jax.y + PLAYER_SIZE/2;
  const dx = mouse.x - jcx, dy = mouse.y - jcy;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const speed = PLAYER_SPEED * buffSpeedMult();
  const pushVec = buffPushVec();

  const isMoving = dist > 4;
  jax.moving = isMoving;

  if (isMoving) {
    const move = Math.min(speed * dt, dist);
    jax.x += (dx / dist) * move + pushVec.vx * dt;
    jax.y += (dy / dist) * move + pushVec.vy * dt;
    // Face left or right based on horizontal movement
    if (Math.abs(dx) > 4) jax.facing = dx > 0 ? 1 : -1;
    jax.walkTime += dt;
  } else {
    jax.x += pushVec.vx * dt;
    jax.y += pushVec.vy * dt;
    if (Math.abs(pushVec.vx) > 10) jax.facing = pushVec.vx > 0 ? 1 : -1;
    jax.walkTime = 0;
  }

  // Clamp jax to map
  jax.x = Math.max(WALL_THICK, Math.min(MAP_W - WALL_THICK - PLAYER_SIZE, jax.x));
  jax.y = Math.max(WALL_THICK, Math.min(MAP_H - WALL_THICK - PLAYER_SIZE, jax.y));

  // Villain chase
  for (const v of villains) {
    if (v.stun > 0) {
      v.stun -= dt;
      v.walkTime = 0;
    } else {
      const cdx = jax.x - v.x, cdy = jax.y - v.y;
      const cdist = Math.sqrt(cdx*cdx + cdy*cdy) || 1;
      v.x += (cdx / cdist) * v.speed * dt;
      v.y += (cdy / cdist) * v.speed * dt;
      if (cdist > 4) v.walkTime += dt;
    }
    v.x = Math.max(WALL_THICK, Math.min(MAP_W - WALL_THICK - v.w, v.x));
    v.y = Math.max(WALL_THICK, Math.min(MAP_H - WALL_THICK - v.h, v.y));
  }

  // Pushable physics
  const solids = objects.filter(o => o.kind === 'wall' || o.kind === 'pushable');
  for (const o of objects) {
    if (o.kind !== 'pushable') continue;
    o.x += o.vx * dt;
    o.y += o.vy * dt;
    o.x = Math.max(WALL_THICK, Math.min(MAP_W - WALL_THICK - o.w, o.x));
    o.y = Math.max(WALL_THICK, Math.min(MAP_H - WALL_THICK - o.h, o.y));
    o.vx *= Math.exp(-PUSH_DRAG * dt);
    o.vy *= Math.exp(-PUSH_DRAG * dt);
    if (Math.abs(o.vx) < 2) o.vx = 0;
    if (Math.abs(o.vy) < 2) o.vy = 0;
    // Pushable vs walls
    const walls = objects.filter(w => w.kind === 'wall');
    for (const w of walls) {
      if (overlaps(o, w)) {
        resolveAABB(o, w);
        // Stop velocity on collision axis
        const ex = o.x + o.w/2, ey = o.y + o.h/2;
        const wx = w.x + w.w/2, wy = w.y + w.h/2;
        const ox2 = (o.w/2 + w.w/2) - Math.abs(ex - wx);
        const oy2 = (o.h/2 + w.h/2) - Math.abs(ey - wy);
        if (ox2 < oy2) o.vx = 0; else o.vy = 0;
      }
    }
  }

  // Player vs solids
  const jaxObj = { x: jax.x, y: jax.y, w: PLAYER_SIZE, h: PLAYER_SIZE };
  for (let pass = 0; pass < 3; pass++) {
    for (const s of solids) {
      if (overlaps(jaxObj, s)) {
        if (s.kind === 'pushable') {
          const ex = jaxObj.x + PLAYER_SIZE/2, ey = jaxObj.y + PLAYER_SIZE/2;
          const sx = s.x + s.w/2, sy = s.y + s.h/2;
          const d = Math.sqrt((sx-ex)**2 + (sy-ey)**2) || 1;
          s.vx = ((sx-ex)/d) * PUSH_FORCE;
          s.vy = ((sy-ey)/d) * PUSH_FORCE;
        }
        resolveAABB(jaxObj, s);
      }
    }
  }
  jax.x = jaxObj.x; jax.y = jaxObj.y;

  // Villains vs walls
  const villainSolids = objects.filter(o => o.kind === 'wall' || o.kind === 'pushable');
  for (const v of villains) {
    const vObj = { x: v.x, y: v.y, w: v.w, h: v.h };
    for (let pass = 0; pass < 2; pass++) {
      for (const s of villainSolids) {
        if (overlaps(vObj, s)) resolveAABB(vObj, s);
      }
    }
    v.x = vObj.x; v.y = vObj.y;
  }

  // Pickup checks
  for (let i = objects.length - 1; i >= 0; i--) {
    const o = objects[i];
    if (o.kind !== 'pickup') continue;
    if (overlaps(jaxObj, o)) {
      const def = PICKUP_DEFS[o.type];
      if (def) {
        if (def.effect === 'speed_up') applyBuff('speed_up');
        else if (def.effect === 'stun') { for (const v of villains) v.stun = 2; }
        else if (def.effect === 'push') {
          const jx = jax.x + PLAYER_SIZE/2, jy = jax.y + PLAYER_SIZE/2;
          let nearest = villains[0];
          for (const v of villains) {
            if (Math.hypot(v.x + v.w/2 - jx, v.y + v.h/2 - jy) <
                Math.hypot(nearest.x + nearest.w/2 - jx, nearest.y + nearest.h/2 - jy))
              nearest = v;
          }
          if (nearest) {
            const cx = nearest.x + nearest.w/2, cy = nearest.y + nearest.h/2;
            const d = Math.sqrt((jx-cx)**2 + (jy-cy)**2) || 1;
            applyBuff('push', { vx: ((jx-cx)/d)*400, vy: ((jy-cy)/d)*400 });
          }
        }
        spawnParticles(o.x + o.w/2, o.y + o.h/2, def.color, 12);
      }
      objects.splice(i, 1);
    }
  }

  // Exit check
  if (overlaps(jaxObj, exitPos)) {
    const wasWin = gameState === 'win';
    gameState = 'win';
    if (!wasWin && TEST_MODE && window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'test:win', time: levelTime }, '*');
    }
  }

  // Villain catch check
  for (const v of villains) {
    if (overlaps(jaxObj, v)) {
      gameState = 'game_over';
      caughtBy = v;
      spawnParticles(jax.x + PLAYER_SIZE/2, jax.y + PLAYER_SIZE/2, v.def.color, 20);
      break;
    }
  }

  // Camera follows Jax
  updateCamera();
}


// ─────────────────────────────────────────────
// MAIN DRAW
// ─────────────────────────────────────────────
let t = 0;
function draw(dt) {
  ctx.clearRect(0, 0, VW, VH);

  if (gameState === 'test_idle') {
    buttons = [];
    drawTestIdle();
    return;
  }

  if (gameState === 'lobby') {
    buttons = [];
    canvas.classList.add('lobby');
    drawLobby(t);
    return;
  } else if (gameState === 'level_select') {
    buttons = [];
    canvas.classList.add('lobby');
    drawLevelSelect(t, dt);
    return;
  } else {
    canvas.classList.remove('lobby');
  }

  // Apply camera transform — everything drawn in world space
  ctx.save();
  ctx.translate(-camera.x, -camera.y);

  // Only draw the portion of the map visible in viewport (clipped to world)
  drawMap();
  drawChairs();
  drawPickupObjects(t);
  drawExit(t);
  drawJax();
  for (const v of villains) drawVillain(v);
  drawParticles();

  ctx.restore();

  // HUD drawn in screen space (no camera offset)
  if (gameState === 'lobby') {
    // Lobby covers the whole screen — draw on top of (or instead of) the world
    buttons = [];
    drawLobby(t);
  }
  if (gameState === 'playing') {
    drawHUD(t);
    drawExitCompass();
  }
  if (gameState === 'game_over') {
    drawHUD(t);
    drawGameOver();
  }
  if (gameState === 'win') {
    drawWin();
  }
}

// ─────────────────────────────────────────────
// GAME LOOP
// ─────────────────────────────────────────────
let lastTime = null;
function loop(ts) {
  if (lastTime === null) lastTime = ts;
  const dt = Math.min((ts - lastTime) / 1000, 0.1);
  lastTime = ts;
  t += dt;

  update(dt);
  draw(dt);
  requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────
// TEST MODE — sandbox runner controlled by the map-builder via postMessage.
// Parent posts { type: 'test:load', map } to start, { type: 'test:restart' }
// to replay. We respond with { type: 'test:ready' } after init and
// { type: 'test:state', state } whenever the game state changes.
// ─────────────────────────────────────────────
function setupTestMode() {
  function applyTestMap(mapData) {
    if (!mapData || !mapData.cells) return;
    currentMapData = mapData;
    currentLevelCode = 'TEST';
    let maxCol = 0, maxRow = 0;
    for (const k of Object.keys(mapData.cells)) {
      const [c, r] = k.split(',').map(Number);
      if (c > maxCol) maxCol = c;
      if (r > maxRow) maxRow = r;
    }
    MAP_W = (maxCol + 1) * CELL;
    MAP_H = (maxRow + 1) * CELL;
    resetLevel(); // sets gameState = 'playing'
  }

  window.addEventListener('message', (ev) => {
    const msg = ev.data;
    if (!msg || typeof msg !== 'object') return;
    if (msg.type === 'test:load') applyTestMap(msg.map);
    else if (msg.type === 'test:restart' && currentMapData) resetLevel();
  });

  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type: 'test:ready' }, '*');
  }
}

function drawTestIdle() {
  ctx.fillStyle = '#1a0f06';
  ctx.fillRect(0, 0, VW, VH);
  ctx.fillStyle = '#a08858';
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Loading test map…', VW/2, VH/2);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
initPatterns();
if (TEST_MODE) {
  gameState = 'test_idle';
  setupTestMode();
} else {
  resetLevel();
  gameState = 'lobby';
  handleRoute();
}
requestAnimationFrame(loop);
</script>
