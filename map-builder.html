<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Map Builder — The Chicken Coop</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #1a0f06;
  color: #f0e4c8;
  font-family: 'Courier New', monospace; font-size: 13px;
  -webkit-font-smoothing: none;
}
#app { display: flex; flex-direction: column; height: 100vh; }

/* ── Toolbar — wood plank look ── */
#toolbar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 9px 14px;
  background:
    repeating-linear-gradient(0deg, #3a2818 0 28px, #2e2012 28px 30px),
    #3a2818;
  border-bottom: 4px solid #1a0e04;
  flex-shrink: 0;
  box-shadow: inset 0 2px 0 #5a3e22, 0 2px 0 #1a0e04;
}
.title {
  font-weight: bold;
  color: #f0e4c8;
  letter-spacing: 0.05em;
  text-shadow: 1px 1px 0 #1a0e04, -1px 0 0 #1a0e04;
  padding: 0 4px;
}
.title-accent { color: #cc2020; }
.sep { width: 2px; height: 24px; background: #1a0e04; margin: 0 2px;
  box-shadow: 1px 0 0 #5a3e22; }

button {
  background: #d4b483;
  color: #1a0e04;
  border: 2px solid #1a0e04;
  padding: 4px 10px; cursor: pointer;
  font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold;
  border-radius: 0;
  box-shadow: inset 1px 1px 0 #f0d8a8, inset -1px -1px 0 #a08858;
  letter-spacing: 0.02em;
}
button:hover { background: #e8c898; }
button:active { box-shadow: inset -1px -1px 0 #f0d8a8, inset 1px 1px 0 #a08858; }
button.active {
  background: #cc2020; color: #f0e4c8;
  box-shadow: inset 1px 1px 0 #ee5050, inset -1px -1px 0 #881010;
}
button:disabled { opacity: 0.4; cursor: default; }

#zoom-label {
  min-width: 36px; text-align: center;
  color: #f0e4c8; font-size: 12px; font-weight: bold;
  background: #1a0e04;
  border: 2px solid #5a3e22;
  padding: 2px 4px;
}
#status {
  margin-left: auto; color: #d4b483; font-size: 11px;
  font-weight: bold; letter-spacing: 0.04em;
}
.warn { color: #ffaa44; }
.ok   { color: #66ff99; }

/* ── Workspace ── */
#workspace { display: flex; flex: 1; overflow: hidden; }

/* ── Grid ── */
#grid-wrap {
  flex: 1; position: relative; overflow: hidden;
  background: #1a0f06;
}
#grid-canvas { display: block; }

/* ── Sidebar — looks like a chalkboard panel framed in wood ── */
#sidebar {
  width: 296px; flex-shrink: 0;
  background: #3a2818;
  border-left: 4px solid #1a0e04;
  display: flex; flex-direction: column;
  box-shadow: inset 2px 0 0 #5a3e22;
}
#sidebar-scroll {
  flex: 1; overflow-y: auto; padding: 14px;
  min-height: 0;
}
#sidebar-scroll::-webkit-scrollbar { width: 10px; }
#sidebar-scroll::-webkit-scrollbar-track { background: #1a0e04; }
#sidebar-scroll::-webkit-scrollbar-thumb { background: #5a3e22; border: 1px solid #1a0e04; }
#sidebar-scroll::-webkit-scrollbar-thumb:hover { background: #7a5230; }

#sidebar-footer {
  flex-shrink: 0; padding: 10px 14px 12px;
  border-top: 4px solid #1a0e04;
  background: #1a0e04;
  font-size: 11px; line-height: 1.9;
  font-weight: bold;
  color: #d4b483;
  box-shadow: inset 0 2px 0 #5a3e22;
}

#no-sel {
  color: #a08858; text-align: center; padding: 38px 12px;
  font-size: 12px; line-height: 1.7;
  background: #2a4a35;
  border: 4px solid #1a0e04;
  box-shadow: inset 2px 2px 0 #1a3a25, inset -2px -2px 0 #3a5a45;
  font-family: 'Courier New', monospace;
}
#no-sel b { color: #e8c840; }

#cell-editor h3 {
  color: #f0e4c8;
  margin-bottom: 14px;
  font-size: 13px;
  letter-spacing: 0.06em;
  text-shadow: 1px 1px 0 #1a0e04;
  background: #1a0e04;
  padding: 6px 10px;
  border: 2px solid #5a3e22;
}

.field { margin-bottom: 16px; }
.field > label {
  display: block;
  color: #e8c840;
  margin-bottom: 6px;
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.10em;
  font-weight: bold;
  text-shadow: 1px 1px 0 #1a0e04;
}

.field-section {
  background: rgba(26,14,4,0.4);
  border: 2px solid #1a0e04;
  padding: 10px;
  box-shadow: inset 1px 1px 0 #5a3e22;
}

select {
  width: 100%;
  background: #d4b483;
  color: #1a0e04;
  border: 2px solid #1a0e04;
  padding: 5px 6px;
  font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold;
  border-radius: 0; cursor: pointer;
  box-shadow: inset 1px 1px 0 #f0d8a8, inset -1px -1px 0 #a08858;
}
select:focus { outline: none; background: #e8c898; }

/* Border compass */
.border-compass {
  display: grid;
  grid-template-columns: 1fr 64px 1fr;
  grid-template-rows: 30px 30px 30px;
  gap: 4px; width: 144px; margin: 0 auto;
}
.bc-empty { background: transparent; }
.bc-center {
  background: #1a0e04;
  border: 2px solid #5a3e22;
  display: flex; align-items: center;
  justify-content: center; color: #d4b483; font-size: 18px;
}
.border-btn {
  background: #d4b483;
  border: 2px solid #1a0e04;
  color: #1a0e04;
  cursor: pointer;
  font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold;
  display: flex; align-items: center; justify-content: center;
  user-select: none;
  box-shadow: inset 1px 1px 0 #f0d8a8, inset -1px -1px 0 #a08858;
}
.border-btn:hover { background: #e8c898; }
.border-btn.active {
  background: #8b6f47;
  color: #f0e4c8;
  box-shadow: inset 1px 1px 0 #a07848, inset -1px -1px 0 #6b5235;
}

/* Special — radio-style buttons with mini sprites */
.special-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
}
.spec-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 6px;
  font-size: 10px; font-weight: bold;
  background: #d4b483;
  color: #1a0e04;
  border: 2px solid #1a0e04;
  cursor: pointer;
  box-shadow: inset 1px 1px 0 #f0d8a8, inset -1px -1px 0 #a08858;
  text-align: left;
}
.spec-btn canvas { width: 22px; height: 22px; image-rendering: pixelated; flex-shrink: 0; }
.spec-btn:hover { background: #e8c898; }
.spec-btn.active {
  background: #cc2020; color: #f0e4c8;
  box-shadow: inset 1px 1px 0 #ee5050, inset -1px -1px 0 #881010;
}
#s-player.active { background: #4dabf7; box-shadow: inset 1px 1px 0 #88ccff, inset -1px -1px 0 #2a6a9a; }
#s-exit.active   { background: #00cc66; color: #1a0e04; box-shadow: inset 1px 1px 0 #4ee090, inset -1px -1px 0 #008844; }
#s-villain.active{ background: #cc2020; }

.danger-btn {
  width: 100%;
  background: #5a1810;
  color: #f0e4c8;
  border-color: #1a0e04;
  box-shadow: inset 1px 1px 0 #8a3020, inset -1px -1px 0 #2a0a04;
}
.danger-btn:hover { background: #7a2818; }

hr.divider {
  border: none;
  border-top: 2px solid #1a0e04;
  border-bottom: 2px solid #5a3e22;
  margin: 14px 0;
}

/* ── Background swatches — use real tile patterns ── */
#bg-swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
.bg-swatch {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer; padding: 4px;
  background: #1a0e04;
  border: 2px solid #1a0e04;
}
.bg-swatch:hover { border-color: #d4b483; }
.bg-swatch.active {
  border-color: #e8c840;
  box-shadow: inset 0 0 0 2px #cc2020;
}
.bg-swatch canvas {
  width: 100%; aspect-ratio: 1/1;
  image-rendering: pixelated;
  border: 1px solid #1a0e04;
}
.bg-swatch span {
  font-size: 9px; color: #d4b483; text-align: center;
  line-height: 1.2; font-weight: bold; letter-spacing: 0.04em;
}
.bg-swatch.active span { color: #e8c840; }

/* Object swatches — same but with mini object sprites */
#obj-swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
.obj-swatch {
  cursor: pointer; padding: 4px;
  background: #1a0e04;
  border: 2px solid #1a0e04;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.obj-swatch:hover { border-color: #d4b483; }
.obj-swatch.active {
  border-color: #e8c840;
  box-shadow: inset 0 0 0 2px #cc2020;
}
.obj-swatch canvas {
  width: 100%; aspect-ratio: 1/1;
  image-rendering: pixelated;
  border: 1px solid #1a0e04;
  background: #c8a870;
}
.obj-swatch.none canvas {
  background:
    repeating-linear-gradient(45deg, #2a1a0a 0 4px, #1a0e04 4px 8px);
}
.obj-swatch span {
  font-size: 9px; color: #d4b483; text-align: center;
  line-height: 1.2; font-weight: bold; letter-spacing: 0.04em;
}
.obj-swatch.active span { color: #e8c840; }

/* ── Mode toggle (Builder / Game preview) ── */
#mode-toggle {
  display: inline-flex;
  background: #1a0e04;
  border: 2px solid #1a0e04;
  padding: 0;
}
.mode-btn {
  padding: 4px 12px;
  background: transparent;
  border: none;
  color: #d4b483;
  font-weight: bold;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
  cursor: pointer;
  box-shadow: none;
}
.mode-btn:hover { background: #2e2012; color: #e8c840; }
.mode-btn.active {
  background: #d4b483;
  color: #1a0e04;
  box-shadow: inset 1px 1px 0 #f0d8a8;
}

/* ── Templates Modal ── */
#templates-modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.78);
  display: flex; align-items: center; justify-content: center;
  z-index: 50;
}
#modal-box {
  background: #3a2818;
  border: 4px solid #1a0e04;
  padding: 18px;
  width: min(740px, 94vw);
  max-height: 84vh;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 14px;
  box-shadow: inset 2px 2px 0 #5a3e22, inset -2px -2px 0 #1a0e04, 0 4px 0 #0a0500;
}
#modal-header {
  display: flex; align-items: center; justify-content: space-between;
  background: #1a0e04;
  padding: 8px 12px;
  border: 2px solid #5a3e22;
}
#modal-header span {
  font-weight: bold; color: #f0e4c8; font-size: 14px;
  letter-spacing: 0.08em;
}
#modal-close { padding: 2px 10px; font-size: 14px; }
#modal-subtitle { color: #d4b483; font-size: 11px; padding: 0 4px; }
#template-cards {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
.tpl-card {
  background: #1a0e04;
  border: 2px solid #5a3e22;
  padding: 12px;
  display: flex; flex-direction: column; gap: 7px;
  box-shadow: inset 1px 1px 0 #5a3e22;
}
.tpl-card:hover { border-color: #d4b483; }
.tpl-preview {
  display: block; width: 100%;
  border: 2px solid #5a3e22;
  image-rendering: pixelated;
}
.tpl-name {
  font-weight: bold; color: #f0e4c8; font-size: 13px;
  letter-spacing: 0.04em;
}
.tpl-desc { color: #d4b483; font-size: 10px; line-height: 1.5; }
.tpl-load { width: 100%; margin-top: 2px; }

/* Tool-button row */
.tool-row { display: flex; gap: 4px; }

/* Rotation row */
.rot-row { display: flex; gap: 4px; }
.rot-btn {
  flex: 1;
  background: #d4b483;
  color: #1a0e04;
  border: 2px solid #1a0e04;
  padding: 5px 2px;
  cursor: pointer;
  font-family: 'Courier New', monospace; font-size: 11px; font-weight: bold;
  border-radius: 0;
  box-shadow: inset 1px 1px 0 #f0d8a8, inset -1px -1px 0 #a08858;
  letter-spacing: 0.02em;
  text-align: center;
}
.rot-btn:hover { background: #e8c898; }
.rot-btn.active {
  background: #cc2020; color: #f0e4c8;
  box-shadow: inset 1px 1px 0 #ee5050, inset -1px -1px 0 #881010;
}

/* "?" help cluster */
.kbd {
  display: inline-block;
  padding: 0 4px;
  background: #1a0e04;
  color: #e8c840;
  border: 1px solid #5a3e22;
  font-family: monospace;
  font-size: 10px;
  font-weight: bold;
}
</style>
</head>
<body>
<div id="app">

  <!-- Toolbar -->
  <div id="toolbar">
    <button id="btn-back" title="Back to lobby" onclick="window.location.href='index.html'" style="background:#cc2020;color:#f0e4c8;box-shadow:inset 1px 1px 0 #ee5050, inset -1px -1px 0 #881010;">◀ BACK</button>
    <div class="sep"></div>
    <span class="title"><span class="title-accent">CHANDLER'S</span> MAP BUILDER</span>
    <div class="sep"></div>

    <div class="tool-row">
      <button id="t-select" class="active" title="S — Select cells">SELECT</button>
      <button id="t-paint"  title="P — Place cells">PLACE</button>
      <button id="t-erase"  title="E — Erase cells">ERASE</button>
    </div>

    <div class="sep"></div>

    <div id="mode-toggle">
      <button class="mode-btn active" id="m-builder" title="Builder view (grid + edit)">BUILDER</button>
      <button class="mode-btn" id="m-game" title="Game view (sprites only)">GAME</button>
    </div>

    <div class="sep"></div>

    <div style="display:flex;align-items:center;gap:4px">
      <button id="zoom-out" title="Zoom out (-)">−</button>
      <span id="zoom-label">16px</span>
      <button id="zoom-in"  title="Zoom in (+)">+</button>
    </div>

    <div class="sep"></div>

    <div class="tool-row">
      <button id="btn-new">NEW</button>
      <button id="btn-templates">TEMPLATES</button>
      <button id="btn-load">LOAD</button>
      <button id="btn-export">EXPORT</button>
      <input type="file" id="file-input" accept=".json" style="display:none">
    </div>

    <span id="status">0 cells</span>
  </div>

  <!-- Templates Modal -->
  <div id="templates-modal" style="display:none">
    <div id="modal-box">
      <div id="modal-header">
        <span>★ PRE-BUILT MAPS ★</span>
        <button id="modal-close">✕</button>
      </div>
      <p id="modal-subtitle">Starter maps — load one to play, or use as a base.</p>
      <div id="template-cards"></div>
    </div>
  </div>

  <!-- Workspace -->
  <div id="workspace">
    <div id="grid-wrap">
      <canvas id="grid-canvas"></canvas>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
    <div id="sidebar-scroll">

      <!-- Always-visible background picker -->
      <div class="field">
        <label>★ Background</label>
        <div id="bg-swatches"></div>
      </div>

      <hr class="divider">

      <div id="no-sel">
        <b>★ NO CELL SELECTED ★</b><br><br>
        Click a cell with <b>SELECT</b><br>
        to edit it.<br><br>
        Use <b>PLACE</b> to add cells,<br>
        <b>ERASE</b> to remove them.
      </div>

      <div id="cell-editor" style="display:none">
        <h3 id="cell-title">CELL [0, 0]</h3>

        <div class="field">
          <label>★ Background</label>
          <select id="bg-select">
            <option value="empty">Void</option>
            <option value="hallway">Hallway (tan tile)</option>
            <option value="classroom">Classroom (linoleum)</option>
            <option value="cafeteria">Cafeteria</option>
            <option value="carpet">Carpet (office)</option>
            <option value="grass">Grass (field)</option>
            <option value="dirt">Dirt (baseball)</option>
            <option value="concrete">Concrete</option>
            <option value="asphalt">Asphalt (court)</option>
          </select>
        </div>

        <div class="field">
          <label>★ Borders — Brick Wall</label>
          <div class="border-compass">
            <div class="bc-empty"></div>
            <button class="border-btn" id="b-n">N</button>
            <div class="bc-empty"></div>

            <button class="border-btn" id="b-w">W</button>
            <div class="bc-center">▣</div>
            <button class="border-btn" id="b-e">E</button>

            <div class="bc-empty"></div>
            <button class="border-btn" id="b-s">S</button>
            <div class="bc-empty"></div>
          </div>
        </div>

        <div class="field">
          <label>★ Object</label>
          <div id="obj-swatches"></div>
        </div>

        <div class="field" id="rotation-field">
          <label>★ Rotation <span style="color:#a08858;font-size:9px;font-weight:normal">(R to cycle)</span></label>
          <div class="rot-row">
            <button class="rot-btn active" data-rot="0"   title="0° — default orientation">0°</button>
            <button class="rot-btn"        data-rot="90"  title="90° clockwise">90°</button>
            <button class="rot-btn"        data-rot="180" title="180°">180°</button>
            <button class="rot-btn"        data-rot="270" title="270° clockwise">270°</button>
          </div>
        </div>

        <div class="field">
          <label>★ Special — Spawn Marker</label>
          <div class="special-grid">
            <button class="spec-btn" id="s-player"><canvas width="32" height="32"></canvas><span>JAX</span></button>
            <button class="spec-btn" id="s-exit"><canvas width="32" height="32"></canvas><span>EXIT</span></button>
            <button class="spec-btn" id="s-villain"><canvas width="32" height="32"></canvas><span>CHANDLER</span></button>
            <button class="spec-btn" id="s-pickup-gel"><canvas width="32" height="32"></canvas><span>HAIR GEL</span></button>
            <button class="spec-btn" id="s-pickup-mirror"><canvas width="32" height="32"></canvas><span>MIRROR</span></button>
            <button class="spec-btn" id="s-pickup-spray"><canvas width="32" height="32"></canvas><span>HAIRSPRAY</span></button>
          </div>
        </div>

        <hr class="divider">

        <button class="danger-btn" id="btn-deactivate">✕ DEACTIVATE CELL</button>
      </div>

    </div><!-- /sidebar-scroll -->
    <div id="sidebar-footer"></div>
    </div><!-- /sidebar -->
  </div>
</div>

<script src="mb-sprites.js"></script>
<script src="mb-app.js"></script>
</body>
</html>
