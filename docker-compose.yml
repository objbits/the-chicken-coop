name: the-chicken-academy

services:
  node:
    build: .
    ports:
      - "3040:3040"
    environment:
      - REDIS_URL=redis://redis:6380
      - PORT=3040
      - APP_NAME=The Chicken Academy
      - APP_DOMAIN=thechickenacademy.com
      - ADMIN_KEY=${ADMIN_KEY:-changeme}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6380"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --port 6380
    restart: unless-stopped

volumes:
  redis_data:
